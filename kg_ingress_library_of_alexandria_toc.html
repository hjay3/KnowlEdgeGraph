let activeFilters=new Set(), searchQ='', allExpanded=false;

function bHtml(src){const s=SOURCES[src];return `<span style="font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;white-space:nowrap;background:${s.bg};color:${s.fg};border:${s.brd||'none'}">${s.label}</span>`;}

function applyFilters(){
  searchQ=document.getElementById('q').value.toLowerCase();
  DOMAINS.forEach(dom=>{
    let vis=0;
    dom.ds.forEach((ds,i)=>{
      const row=document.getElementById(`ds-${dom.id}-${i}`);
      const mSrc=activeFilters.size===0||activeFilters.has(ds.src);
      const mQ=!searchQ||[ds.n,ds.id,ds.desc,ds.node,dom.name].some(s=>s.toLowerCase().includes(searchQ));
      const show=mSrc&&mQ;
      if(row)row.style.display=show?'':'none';
      if(show)vis++;
    });
    const card=document.getElementById(`dom-${dom.id}`);
    if(card)card.style.display=(vis===0&&(activeFilters.size>0||searchQ))?'none':'';
    const badge=document.getElementById(`cnt-${dom.id}`);
    if(badge)badge.textContent=(vis<dom.ds.length?vis+'/':'')+dom.ds.length+' datasets';
    if(searchQ&&vis>0){const body=document.getElementById(`body-${dom.id}`);if(body)body.style.display='block';document.getElementById(`arr-${dom.id}`).textContent='▼';}
  });
}

function toggleExpand(id){
  const body=document.getElementById(`body-${id}`);
  const arr=document.getElementById(`arr-${id}`);
  const open=body.style.display!=='none'&&body.style.display!=='';
  body.style.display=open?'none':'block';
  arr.textContent=open?'▶':'▼';
}

function toggleAll(){
  allExpanded=!allExpanded;
  DOMAINS.forEach(d=>{
    const body=document.getElementById(`body-${d.id}`);
    const arr=document.getElementById(`arr-${d.id}`);
    if(body){body.style.display=allExpanded?'block':'none';}
    if(arr)arr.textContent=allExpanded?'▼':'▶';
  });
  document.getElementById('expand-btn').textContent=allExpanded?'Collapse all':'Expand all';
}

function toggleFilter(src){
  if(activeFilters.has(src))activeFilters.delete(src);else activeFilters.add(src);
  Object.keys(SOURCES).forEach(s=>{
    const btn=document.getElementById(`flt-${s}`);
    if(btn)btn.style.opacity=(activeFilters.size===0||activeFilters.has(s))?'1':'0.35';
  });
  applyFilters();
}

function exportDomain(id){
  const dom=DOMAINS.find(d=>d.id===id);
  const out=JSON.stringify({domain:dom.name,id:dom.id,categories:dom.cats,datasets:dom.ds.map(ds=>({name:ds.n,source:SOURCES[ds.src].label,identifier:ds.id,scale:ds.sz,format:ds.fmt,kg_node_type:ds.node,description:ds.desc}))},null,2);
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([out],{type:'application/json'}));a.download=`kg-ingress-${id}.json`;a.click();
}

function exportAll(){
  const out=JSON.stringify({title:'Library of Alexandria — KG Ingress ToC',generated:new Date().toISOString(),total_datasets:DOMAINS.reduce((a,d)=>a+d.ds.length,0),total_domains:DOMAINS.length,domains:DOMAINS.map(dom=>({id:dom.id,name:dom.name,categories:dom.cats,datasets:dom.ds.map(ds=>({name:ds.n,source:SOURCES[ds.src].label,identifier:ds.id,scale:ds.sz,format:ds.fmt,kg_node_type:ds.node,description:ds.desc}))}))},null,2);
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([out],{type:'application/json'}));a.download='kg-ingress-library-of-alexandria.json';a.click();
}

function renderDomain(dom){
  const catPreview=dom.cats.slice(0,4).join(' · ');

<div style="font-size:11px;color:var(--color-text-secondary)">${ds.desc}</div>
</td>
<td style="padding:8px;vertical-align:top;border-bottom:0.5px solid var(--color-border-tertiary);white-space:nowrap">${bHtml(ds.src)}</td>

<td style="padding:8px;vertical-align:top;border-bottom:0.5px solid var(--color-border-tertiary);white-space:nowrap;font-size:11px;color:var(--color-text-secondary)">${ds.sz}</td>
<td style="padding:8px;vertical-align:top;border-bottom:0.5px solid var(--color-border-tertiary);white-space:nowrap;font-size:11px;color:var(--color-text-secondary)">${ds.fmt}</td>
<td style="padding:8px 1rem 8px 8px;vertical-align:top;border-bottom:0.5px solid var(--color-border-tertiary)"><code style="font-family:var(--font-mono);font-size:10px;color:${dom.color};background:var(--color-background-secondary);padding:2px 5px;border-radius:3px;border:0.5px solid ${dom.color}55">${ds.node}</code></td>
</tr>`).join('');

return `<div id="dom-${dom.id}" style="border:0.5px solid var(--color-border-tertiary);border-left:3px solid ${dom.color};border-radius:var(--border-radius-lg);overflow:hidden;background:var(--color-background-primary);margin-bottom:8px">
<div onclick="toggleExpand('${dom.id}')" style="display:flex;align-items:center;gap:12px;padding:0.875rem 1rem;cursor:pointer;user-select:none">
<div style="width:34px;height:34px;border-radius:8px;background:${dom.color}20;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;color:${dom.color};flex-shrink:0">${dom.icon}</div>
<div style="flex:1;min-width:0">
<div style="font-size:14px;font-weight:500;margin-bottom:2px">${dom.name}</div>
<div style="font-size:11px;color:var(--color-text-tertiary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${catPreview} …</div>
</div>
<span id="cnt-${dom.id}" style="font-size:11px;color:var(--color-text-secondary);white-space:nowrap;flex-shrink:0;margin-right:8px">${dom.ds.length} datasets</span>
<span id="arr-${dom.id}" style="color:var(--color-text-tertiary);font-size:11px;flex-shrink:0">▶</span>
</div>
<div id="body-${dom.id}" style="display:none;border-top:0.5px solid var(--color-border-tertiary)">
<div style="padding:0.75rem 1rem 0.5rem">
<p style="font-size:11px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:0.05em;margin-bottom:6px">SUBJECT AREAS</p>
<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:1rem">${dom.cats.map(c=>`<span style="font-size:11px;padding:3px 9px;border-radius:12px;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary)">${c}</span>`).join('')}</div>
<p style="font-size:11px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:0.05em;margin-bottom:6px">INDEXED DATASETS</p>
</div>
<div style="overflow-x:auto">
<table style="width:100%;border-collapse:collapse;font-size:12px">
<thead><tr style="border-bottom:0.5px solid var(--color-border-secondary)">
<th style="text-align:left;padding:5px 1rem;font-weight:500;font-size:10px;color:var(--color-text-tertiary);letter-spacing:0.04em">DATASET</th>
<th style="text-align:left;padding:5px 8px;font-weight:500;font-size:10px;color:var(--color-text-tertiary);letter-spacing:0.04em">SOURCE</th>
<th style="text-align:left;padding:5px 8px;font-weight:500;font-size:10px;color:var(--color-text-tertiary);letter-spacing:0.04em">IDENTIFIER / PATH</th>
<th style="text-align:left;padding:5px 8px;font-weight:500;font-size:10px;color:var(--color-text-tertiary);letter-spacing:0.04em">SCALE</th>
<th style="text-align:left;padding:5px 8px;font-weight:500;font-size:10px;color:var(--color-text-tertiary);letter-spacing:0.04em">FORMAT</th>
<th style="text-align:left;padding:5px 1rem 5px 8px;font-weight:500;font-size:10px;color:var(--color-text-tertiary);letter-spacing:0.04em">KG NODE TYPE</th>
</tr></thead>
<tbody>${dsRows}</tbody>
</table>
</div>
<div style="padding:0.75rem 1rem;display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-top:0.5px solid var(--color-border-tertiary)">
<button onclick="sendPrompt('Design a full KG schema for the ${dom.name} domain: node types, edge types, properties, and ingestion strategy for the datasets in the ingress ToC')" style="font-size:12px">Generate KG schema ↗</button>
<button onclick="exportDomain('${dom.id}')" style="font-size:12px">Export domain JSON ↗</button>
<span style="font-size:11px;color:var(--color-text-tertiary);margin-left:auto">${dom.ds.length} datasets · ${dom.cats.length} subject areas</span>
</div>
</div>
</div>`;
}

// Init
const totalDS=DOMAINS.reduce((a,d)=>a+d.ds.length,0);
const totalCats=DOMAINS.reduce((a,d)=>a+d.cats.length,0);
document.getElementById('stats-row').innerHTML=[
{n:DOMAINS.length,l:'knowledge domains'},
{n:totalDS,l:'indexed datasets'},
{n:Object.keys(SOURCES).length,l:'source types'},
{n:totalCats,l:'subject categories'},
{n:'PB+',l:'estimated data scale'},
].map(s=>`<div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:0.5rem 0.875rem;min-width:90px"><div style="font-size:20px;font-weight:500">${s.n}</div><div style="font-size:11px;color:var(--color-text-secondary)">${s.l}</div></div>`).join('');

document.getElementById('src-filters').innerHTML=Object.entries(SOURCES).map(([k,s])=>`<button id="flt-${k}" onclick="toggleFilter('${k}')" style="font-size:11px;padding:4px 10px;background:${s.bg};color:${s.fg};border:${s.brd||'0.5px solid transparent'};border-radius:var(--border-radius-md)">${s.label}</button>`).join('');

document.getElementById('domain-list').innerHTML=DOMAINS.map(renderDomain).join('');
</script>
